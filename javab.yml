apiVersion: v1
kind: Pod

metadata:
  name: javab
  labels:
    app: my-app

spec:
  containers:
  - name: javab
    image: prashantchitale22/javab:latest

    ports:
    - containerPort: 8080

    env:
    - name: DB_URL
      value: "jdbc:mysql://mysql-svc:3306/student_db"

    - name: DB_USERNAME
      value: "root"

    - name: DB_PASSWORD
      value: "123"
     