
---
# nameSpace

apiVersion: v1
kind: Namespace
metadata:
  name: dev1


---

# nameSpace pod

---
apiVersion: v1
kind: Pod
metadata:
  name: nginx
  namespace: dev1
  labels:
    app: my-app
spec:
  containers:
  - name: nginx
    image: nginx:1.14.2
    ports:
    - containerPort: 80


---

apiVersion: v1
kind: Service
metadata:
  name: my-service
  namespace: dev1
spec:
  selector:
    app: my-app
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
  type: NodePort 
---

apiVersion: v1
kind: Service
metadata:
  name: my-service
spec:
  selector:
    run: my-app
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080
  type: NodePort



  
