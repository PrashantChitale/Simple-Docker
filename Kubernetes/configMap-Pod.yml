apiVersion: v1
kind: Pod
metadata:
  name: pod-01
spec:
  containers:
    - name: con-01
      image: mysql:latest
      ports:
       - containerPort: 3306
      env:
        - name: MYSQL_ROOT_PASSWORD
          value: "redhat"
        - name: USER_NAME
          value: "admin"
        - name: MY-CITY
          value: "pune"

---


apiVersion: v1
kind: ConfigMap
metadata:
  name: my-cred
data:
  PASSWORD: "ubuntu"
  USERNAME: "shubham"
  CITY: "Mumbai"

---

apiVersion: v1
kind: Pod
metadata:
  name: pod-02
spec:
  containers:
    - name: con-01
      image: mysql:latest
      ports:
       - containerPort: 3306
      env:
        - name: MYSQL_ROOT_PASSWORD
          valueFrom:
            configMapKeyRef:
              name: my-cred
              key: PASSWORD
        - name: USER_NAME
          valueFrom:
            configMapKeyRef:
              name: my-cred              
              key: USERNAME
        - name: MY-CITY
          valueFrom:
            configMapKeyRef:
              name: my-cred
              key: CITY

---

apiVersion: v1
kind: Secret
metadata:
  name: my-secret
data:
  PASSWORD: Q2xvaXVkYmxpdHo=   # echo -n "Cloudblitz" | base64
  USERNAME: UHJhc2hhbnQ=       # echo -n "Prashant" | base64
  CITY: TmFncHVy               #echo -n Nagpur | base64

---
apiVersion: v1
kind: Pod
metadata:
  name: pod-03
spec:
  containers:
    - name: con-01
      image: mysql:latest
      ports:
       - containerPort: 3306
      env:
        - name: MYSQL_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: my-secret
              key: PASSWORD  
        - name: USER_NAME
          valueFrom:
            secretKeyRef:
              name: my-secret
              key: USERNAME
        - name: MY-CITY
          valueFrom:
            secretKeyRef:
              name: my-secret
              key: CITY