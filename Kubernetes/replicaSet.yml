apiVersion: apps/v1
kind: ReplicaSet
metadata:
  name: my-rs
spec:
 
  replicas: 5
  selector:
    matchLabels:
      app: my-app

  template:
    metadata:
      labels:
        app: my-app
    spec:
      containers:
      - name: app
        image: nginx:latest
        ports:
        - containerPort: 80
      
  